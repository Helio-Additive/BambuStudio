on:
  workflow_call:
    inputs:
      cache-key:
        required: true
        type: string
      cache-path:
        required: true
        type: string
      os:
        required: true
        type: string
      arch:
        required: false
        type: string

jobs:
  build_bambu:
    name: Build BambuStudio
    runs-on: ${{ inputs.os }}
    env:
      date:
      ver:
      ver_pure:

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: 'true'

      - name: load cached deps
        uses: actions/cache@v5
        with:
          path: ${{ inputs.cache-path }}
          key: ${{ inputs.cache-key }}
          fail-on-cache-miss: true

      - name: Get the version and date on Ubuntu and macOS
        if: inputs.os != 'windows-latest'
        run: |
          ver_pure=$(grep 'set(SLIC3R_VERSION' version.inc | cut -d '"' -f2)
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            ver="PR-${{ github.event.number }}"
          else
            ver=V$ver_pure
          fi
          echo "ver=$ver" >> $GITHUB_ENV
          echo "ver_pure=$ver_pure" >> $GITHUB_ENV
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_ENV
        shell: bash

      - name: Get the version and date on Windows
        if: inputs.os == 'windows-latest'
        run: |
          $date = Get-Date -Format 'yyyyMMdd'
          $ref = "${{ github.ref }}"
          $eventName = "${{ github.event_name }}"
          $prNumber = "${{ github.event.number }}"

          if ($eventName -eq 'pull_request') {
              $ver = "PR" + $prNumber
          } else {
              $versionContent = Get-Content version.inc -Raw
              if ($versionContent -match 'set\(SLIC3R_VERSION "(.*?)"\)') {
                  $ver = $matches[1]
              }
              $ver = "V$ver"
          }

          echo "ver=$ver" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          echo "date=$date" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          echo "date: ${{ env.date }} version: ${{ env.ver }}"
        shell: pwsh

  #   Mac
      - name: Build slicer mac
        if: inputs.os == 'macos-13'
        working-directory: ${{ github.workspace }}
        run: |
          brew install automake texinfo
          brew unlink cmake || true
          brew tap-new $USER/old-cmake
          brew extract --version=3.31.0 cmake $USER/old-cmake
          brew install $USER/old-cmake/cmake@3.31.0
          brew link --overwrite cmake@3.31.0
          brew pin cmake@3.31.0
          ./BuildMac.sh -s -x -a x86_64 -t 10.15 -1

      - name: Build slicer mac
        if: inputs.os == 'macos-15'
        working-directory: ${{ github.workspace }}
        run: |
          brew install automake texinfo
          brew unlink cmake || true
          brew tap-new $USER/old-cmake
          brew extract --version=3.31.0 cmake $USER/old-cmake
          brew install $USER/old-cmake/cmake@3.31.0
          brew link --overwrite cmake@3.31.0
          brew pin cmake@3.31.0
          ./BuildMac.sh -s -x -a universal -t 10.15 -1

      - name: Bundle mac app
        if: inputs.os == 'macos-13' || inputs.os == 'macos-15'
        working-directory: ${{ github.workspace }}
        run: |
          if [[ "${{ inputs.os }}" == "macos-13" ]]; then
            BUILD_ARCH="x86_64"
          else
            BUILD_ARCH="arm64"
          fi
          APP_SRC="${{ github.workspace }}/build/${BUILD_ARCH}/src/BambuStudio.app"
          APP_DST="${{ github.workspace }}/build/${BUILD_ARCH}/BambuStudio/BambuStudio.app"
          mkdir -p "$(dirname "$APP_DST")"
          cp -R "$APP_SRC" "$APP_DST"

          # Resolve Resources symlink
          RESOURCES="$APP_DST/Contents/Resources"
          if [ -L "$RESOURCES" ]; then
            REAL_RESOURCES=$(readlink "$RESOURCES")
            rm "$RESOURCES"
            cp -R "$REAL_RESOURCES" "$RESOURCES"
          fi

          # Clean unsealed content that breaks codesign
          find "$APP_DST" -name '.DS_Store' -delete
          find "$APP_DST" -name '*.pyc' -delete

          # Bundle external dylibs
          MACOS_BIN="$APP_DST/Contents/MacOS/BambuStudio"
          FRAMEWORKS="$APP_DST/Contents/Frameworks"
          mkdir -p "$FRAMEWORKS"
          for dylib in $(otool -L "$MACOS_BIN" | grep '/opt/homebrew\|/usr/local' | awk '{print $1}'); do
            DYLIB_NAME=$(basename "$dylib")
            cp "$dylib" "$FRAMEWORKS/$DYLIB_NAME"
            chmod 644 "$FRAMEWORKS/$DYLIB_NAME"
            install_name_tool -id "@executable_path/../Frameworks/$DYLIB_NAME" "$FRAMEWORKS/$DYLIB_NAME"
            install_name_tool -change "$dylib" "@executable_path/../Frameworks/$DYLIB_NAME" "$MACOS_BIN"
          done

      - name: Sign mac app
        if: inputs.os == 'macos-13' || inputs.os == 'macos-15'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          if [[ -z "$MACOS_CERTIFICATE" ]]; then
            echo "No signing certificate configured, skipping code signing"
            exit 0
          fi

          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PWD=$(openssl rand -base64 32)

          echo "$MACOS_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12

          security create-keychain -p "$KEYCHAIN_PWD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PWD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/certificate.p12 -P "$MACOS_CERTIFICATE_PWD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PWD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          IDENTITY=$(security find-identity -v -p codesigning $KEYCHAIN_PATH | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          echo "Signing with: $IDENTITY"

          if [[ "${{ inputs.os }}" == "macos-13" ]]; then
            BUILD_ARCH="x86_64"
          else
            BUILD_ARCH="arm64"
          fi
          APP_PATH="${{ github.workspace }}/build/${BUILD_ARCH}/BambuStudio/BambuStudio.app"

          # Sign all nested executables, dylibs, and frameworks first
          find "$APP_PATH/Contents" -type f \( -name "*.dylib" -o -name "*.so" -o -perm +111 \) -not -path "*/MacOS/BambuStudio" | while read -r f; do
            codesign --force --options runtime --timestamp --sign "$IDENTITY" "$f" 2>/dev/null || true
          done
          # Sign the main app bundle
          codesign --force --options runtime --timestamp --sign "$IDENTITY" "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Notarize mac app
        if: inputs.os == 'macos-13' || inputs.os == 'macos-15'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          if [[ -z "$MACOS_CERTIFICATE" || -z "$APPLE_ID" ]]; then
            echo "Notarization not configured, skipping"
            exit 0
          fi

          if [[ "${{ inputs.os }}" == "macos-13" ]]; then
            BUILD_ARCH="x86_64"
          else
            BUILD_ARCH="arm64"
          fi
          APP_PATH="${{ github.workspace }}/build/${BUILD_ARCH}/BambuStudio/BambuStudio.app"

          ditto -c -k --keepParent "$APP_PATH" "$RUNNER_TEMP/BambuStudio.zip"

          xcrun notarytool submit "$RUNNER_TEMP/BambuStudio.zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait --timeout 30m

          xcrun stapler staple "$APP_PATH"

      - name: Create DMG
        if: inputs.os == 'macos-13' || inputs.os == 'macos-15'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          if [[ "${{ inputs.os }}" == "macos-13" ]]; then
            BUILD_ARCH="x86_64"
          else
            BUILD_ARCH="arm64"
          fi
          APP_PATH="${{ github.workspace }}/build/${BUILD_ARCH}/BambuStudio/BambuStudio.app"
          DMG_PATH="${{ github.workspace }}/BambuStudio_Mac_${{inputs.arch}}_${{ env.ver }}.dmg"

          hdiutil create -volname "BambuStudio" -srcfolder "$APP_PATH" -ov -format UDZO "$DMG_PATH"

          if [[ -n "$APPLE_ID" ]]; then
            xcrun notarytool submit "$DMG_PATH" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --wait --timeout 30m
            xcrun stapler staple "$DMG_PATH"
          fi

      - name: Upload artifacts mac
        if: inputs.os == 'macos-13' || inputs.os == 'macos-15'
        uses: actions/upload-artifact@v6
        with:
          name: BambuStudio_Mac_${{inputs.arch}}_${{ env.ver }}
          path: ${{ github.workspace }}/BambuStudio_Mac_${{inputs.arch}}_${{ env.ver }}.dmg

  # Windows
      - name: setup MSVC
        if: inputs.os == 'windows-latest'
        uses: microsoft/setup-msbuild@v2

      - name: Install nsis and pkgconfig
        if: inputs.os == 'windows-latest'
        run: |
          dir "C:/Program Files (x86)/Windows Kits/10/Include"
          choco install nsis
          choco install pkgconfiglite

      - name: Build slicer Win
        if: inputs.os == 'windows-latest'
        working-directory: ${{ github.workspace }}
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A X64 -DBBL_RELEASE_TO_PUBLIC=1 -DBBL_INTERNAL_TESTING=0 -DCMAKE_PREFIX_PATH="${{ github.workspace }}\deps\build\BambuStudio_dep\usr\local" -DCMAKE_INSTALL_PREFIX="../install-dir" -DCMAKE_BUILD_TYPE=Release -DWIN10SDK_PATH="C:/Program Files (x86)/Windows Kits/10/Include/10.0.22000.0"
          cmake --build . --target install --config Release -- -m

      # - name: Create installer Win
      #   if: inputs.os == 'windows-latest'
      #   working-directory: ${{ github.workspace }}/build
      #   run: |
      #     cpack -G NSIS

      - name: Pack app
        if: inputs.os == 'windows-latest'
        working-directory: ${{ github.workspace }}
        shell: cmd
        run: '"C:/Program Files/7-Zip/7z.exe" a -tzip BambuStudio_Windows_${{ env.ver }}_portable.zip ${{ github.workspace }}/install-dir'

      # - name: Pack PDB
      #   if: inputs.os == 'windows-latest'
      #   working-directory: ${{ github.workspace }}/build/src/Release
      #   shell: cmd
      #   run: '"C:/Program Files/7-Zip/7z.exe" a -m0=lzma2 -mx9 Debug_PDB_${{ env.ver }}_for_developers_only.7z  *.pdb'

      - name: Upload artifacts Win zip
        if: inputs.os == 'windows-latest'
        uses: actions/upload-artifact@v6
        with:
          name: BambuStudio_Windows_${{ env.ver }}_portable
          path: ${{ github.workspace }}/BambuStudio_Windows_${{ env.ver }}_portable.zip


  # Ubuntu
      - name: Install dependencies from BuildLinux.sh
        if: inputs.os == 'ubuntu-22.04' || inputs.os == 'ubuntu-24.04'
        shell: bash
        run: sudo ./BuildLinux.sh -ur

      - name: Fix permissions
        if: inputs.os == 'ubuntu-22.04' || inputs.os == 'ubuntu-24.04'
        shell: bash
        run: sudo chown $USER -R ./

      - name: Build slicer
        if: inputs.os == 'ubuntu-22.04' || inputs.os == 'ubuntu-24.04'
        shell: bash
        run: |
          ./BuildLinux.sh -isfr
          mv -n ./build/BambuStudio_ubu64.AppImage ./build/Bambu_Studio_${{inputs.os}}_${{ env.ver }}.AppImage

      # - name: Build orca_custom_preset_tests
      #   if: github.ref == 'refs/heads/main' && inputs.os == 'ubuntu-22.04'
      #   working-directory: ${{ github.workspace }}/build/src
      #   shell: bash
      #   run: |
      #     ./OrcaSlicer_profile_validator -p ${{ github.workspace }}/resources/profiles -g 1
      #     cd ${{ github.workspace }}/resources/profiles
      #     zip -r orca_custom_preset_tests.zip user/

      - name: Upload artifacts Ubuntu
        if: ${{ ! env.ACT && (inputs.os == 'ubuntu-22.04' || inputs.os == 'ubuntu-24.04') }}
        uses: actions/upload-artifact@v6
        with:
          name: BambuStudio_${{inputs.os}}_${{ env.ver }}
          path: './build/Bambu_Studio_${{inputs.os}}_${{ env.ver }}.AppImage'

